name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'ansible/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
 
  ci:
    name: Lint & Test
    runs-on:  ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports: ['27017:27017']
      redis:
        image: redis:7
        ports: ['6379:6379']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      # Validate the Dockerfile builds on PRs (no push until merge)
      - name: Docker build (validate)
        working-directory: backend
        run: |
          docker build -f dockerfile -t Ecommerce/backend:pr-${{ github.sha }} .

 
