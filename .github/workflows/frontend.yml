
# ON PULL REQUEST:
#   Lint → TypeScript check → Vite build → Docker build (validate only, no push)
#   This runs in ~2 minutes and catches broken code before it reaches main.
#

name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
jobs:
  # Job 1: CI 
  ci:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (Vite)
        working-directory: frontend
        env:
          VITE_API_URL: /api
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
        run: npm run build

      # Validate the Dockerfile builds successfully (no push yet on PRs)
      - name: Docker build (validate)
        working-directory: frontend
        run: |
          docker build \
            --build-arg VITE_API_URL=/api \
            --build-arg VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }} \
            -f dockerfile \
            -t Eissa/frontend:pr-${{ github.sha }} \
            .
